<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking System</title>
</head>
<body>

<h1>Book an Appointment</h1>

<div id="slots"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4FUJwe0MHWnG_NNTRSTzZpjFw1FwpHfk",
      authDomain: "githubpages-demo.firebaseapp.com",
      projectId: "githubpages-demo",
      storageBucket: "githubpages-demo.firebasestorage.app",
      messagingSenderId: "955386076992",
      appId: "1:955386076992:web:5b8cb07ec8115e189ce4a5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const slotsDiv = document.getElementById("slots");
    const slotsRef = collection(db, "slots");

    // DISPLAY ALL SLOTS
    onSnapshot(slotsRef, (snapshot) => {
      slotsDiv.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        const div = document.createElement("div");
        div.style.marginBottom = "10px";

        div.textContent = data.time + " with " + data.guidance + " ";

        if (!data.status) {
          const btn = document.createElement("button");
          btn.textContent = "Book";
          btn.onclick = () => bookSlot(docSnap.id);
          div.appendChild(btn);
        } else {
          const taken = document.createElement("span");
          taken.textContent = "(BOOKED by " + data.student + ")";
          div.appendChild(taken);
        }

        slotsDiv.appendChild(div);
      });
    });

    // BOOK SLOT
    window.bookSlot = async function (id) {
      const name = prompt("Enter your name:");
      if (!name) return;

      const slotRef = doc(db, "slots", id);

      await updateDoc(slotRef, {
        status: true,
        student: name
      });
    };

</script>

</body>
</html>
